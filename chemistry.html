<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>化学不需要背——拖拽两个元素，看它们自己组合</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#faf6f0;color:#2c2416;min-height:100vh;overflow-x:hidden}
header{text-align:center;padding:24px 16px 8px}
header h1{font-size:20px;color:#8b6914;margin-bottom:4px}
header p{font-size:13px;color:#9b8c7a}
/* 提示区 */
#hint{text-align:center;font-size:14px;color:#b8976e;padding:4px;min-height:24px;transition:all .3s}
/* 元素选择区 */
#elements{padding:12px 8px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:600px;margin:0 auto}
.elem{width:56px;height:72px;border-radius:10px;cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;transition:all .2s;user-select:none;border:2px solid transparent;position:relative}
.elem:active{cursor:grabbing;transform:scale(1.1)}
.elem .sym{font-size:22px;line-height:1.2}
.elem .name{font-size:10px;color:#7a6e5e;margin-top:2px}
.elem .num{font-size:9px;color:#b0a090;position:absolute;top:4px;left:6px}
/* 元素配色 */
.elem.metal{background:#e8dcc8;border-color:#c4a97d}        /* 金属·暖金 */
.elem.nonmetal{background:#d4e4d0;border-color:#7fa87b}     /* 非金属·青绿 */
.elem.noble{background:#e0d8e8;border-color:#a08ab5}        /* 惰性气体·淡紫 */
.elem.halogen{background:#f0ddd4;border-color:#c4876a}      /* 卤素·橙褐 */
.elem.alkali{background:#f5e6d0;border-color:#d4954a}       /* 碱金属·亮金 */
.elem.alkaline{background:#f0e4c8;border-color:#c4a050}     /* 碱土金属·暗金 */
.elem.transition{background:#e0d4c4;border-color:#a08060}   /* 过渡金属·铜色 */
.elem:hover{box-shadow:0 4px 16px rgba(139,105,20,.25);border-color:#b8860b}
.elem.dragging{opacity:.5;transform:scale(.95)}
/* 拖放槽 */
#slots{display:flex;justify-content:center;gap:24px;padding:16px;flex-wrap:wrap}
.slot{width:120px;height:140px;border:3px dashed #c4b998;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.3s;background:rgba(255,255,255,.4);position:relative}
.slot.drag-over{border-color:#b8860b;background:rgba(184,134,11,.08);box-shadow:0 0 20px rgba(184,134,11,.15)}
.slot.filled{border-style:solid;border-color:#b8860b;background:#fffdf5}
.slot .placeholder{font-size:13px;color:#c4b998;text-align:center}
.slot.filled .placeholder{display:none}
.slot-content{display:none;flex-direction:column;align-items:center}
.slot.filled .slot-content{display:flex}
.slot-content .ssym{font-size:36px;font-weight:bold;color:#3c2a10}
.slot-content .sname{font-size:12px;color:#9b8c7a}
.slot .remove{position:absolute;top:-8px;right:-8px;width:24px;height:24px;background:#c0392b;color:#fff;border-radius:50%;border:none;font-size:14px;cursor:pointer;display:none;line-height:24px;text-align:center}
.slot.filled .remove{display:block}
/* 加号 */
#plus{display:flex;align-items:center;font-size:28px;color:#c4b998;font-weight:bold}
/* 组合按钮 */
#combine-btn{display:block;margin:8px auto 20px;padding:12px 48px;font-size:16px;font-weight:bold;background:linear-gradient(135deg,#b8860b,#d4a017);color:#fff;border:none;border-radius:30px;cursor:pointer;transition:.3s;letter-spacing:2px}
#combine-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(184,134,11,.35)}
#combine-btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
/* 结果区 */
#result{max-width:500px;margin:0 auto 24px;padding:0 16px;display:none}
#result.show{display:block}
.result-card{background:#fffdf5;border:2px solid #d4a017;border-radius:16px;padding:20px;text-align:center}
.result-card .compound{font-size:28px;font-weight:bold;color:#3c2a10;margin-bottom:4px}
.result-card .bond-type{font-size:14px;color:#b8860b;margin-bottom:16px;padding:4px 16px;background:#fdf3d0;border-radius:12px;display:inline-block}
.result-card .formula-note{font-size:12px;color:#9b8c7a;margin-bottom:12px}
/* Canvas结构图 */
#mol-canvas{border-radius:12px;background:#faf8f2;display:block;margin:8px auto;max-width:100%}
/* 底部 */
footer{text-align:center;padding:16px;font-size:11px;color:#c4b998}
footer a{color:#b8860b;text-decoration:none}
/* 移动适配 */
@media(max-width:480px){
  .elem{width:48px;height:64px}.elem .sym{font-size:18px}
  .slot{width:100px;height:120px}
  header h1{font-size:17px}
}
</style>
</head>
<body>

<header>
  <h1>⚗️ 化学不需要背</h1>
  <p>拖两个元素下来，看它们怎么自己组合</p>
</header>

<div id="hint">👇 从下面选一个元素，拖到左边槽里</div>

<!-- 元素选择区 -->
<div id="elements"></div>

<!-- 拖放槽 -->
<div id="slots">
  <div class="slot" id="slot1" data-index="0">
    <div class="placeholder">拖入<br>第一个元素</div>
    <div class="slot-content"><span class="ssym"></span><span class="sname"></span></div>
    <button class="remove" onclick="clearSlot(0)">×</button>
  </div>
  <div id="plus">+</div>
  <div class="slot" id="slot2" data-index="1">
    <div class="placeholder">拖入<br>第二个元素</div>
    <div class="slot-content"><span class="ssym"></span><span class="sname"></span></div>
    <button class="remove" onclick="clearSlot(1)">×</button>
  </div>
</div>

<button id="combine-btn" disabled onclick="combine()">🔬 组合</button>

<div id="result">
  <div class="result-card">
    <div class="compound" id="compound-name"></div>
    <div class="bond-type" id="bond-type"></div>
    <div class="formula-note" id="formula-note"></div>
    <canvas id="mol-canvas" width="400" height="160"></canvas>
  </div>
</div>

<footer>
  化学不需要背 —— 输入计算机，让它给你算出来<br>
  <a href="https://gitee.com/samforce/structural-cognition" target="_blank">论文全文 · 结构认知</a>
</footer>

<script>
// ============ 元素数据 ============
const ELEMENTS = [
  {sym:'H',name:'氢',z:1,valences:[1],en:2.20,cat:'nonmetal'},
  {sym:'He',name:'氦',z:2,valences:[0],en:0,cat:'noble'},
  {sym:'Li',name:'锂',z:3,valences:[1],en:0.98,cat:'alkali'},
  {sym:'Be',name:'铍',z:4,valences:[2],en:1.57,cat:'alkaline'},
  {sym:'B',name:'硼',z:5,valences:[3],en:2.04,cat:'nonmetal'},
  {sym:'C',name:'碳',z:6,valences:[2,4,-4],en:2.55,cat:'nonmetal'},
  {sym:'N',name:'氮',z:7,valences:[-3,3,5],en:3.04,cat:'nonmetal'},
  {sym:'O',name:'氧',z:8,valences:[-2],en:3.44,cat:'nonmetal'},
  {sym:'F',name:'氟',z:9,valences:[-1],en:3.98,cat:'halogen'},
  {sym:'Ne',name:'氖',z:10,valences:[0],en:0,cat:'noble'},
  {sym:'Na',name:'钠',z:11,valences:[1],en:0.93,cat:'alkali'},
  {sym:'Mg',name:'镁',z:12,valences:[2],en:1.31,cat:'alkaline'},
  {sym:'Al',name:'铝',z:13,valences:[3],en:1.61,cat:'metal'},
  {sym:'Si',name:'硅',z:14,valences:[4,-4],en:1.90,cat:'nonmetal'},
  {sym:'P',name:'磷',z:15,valences:[-3,3,5],en:2.19,cat:'nonmetal'},
  {sym:'S',name:'硫',z:16,valences:[-2,4,6],en:2.58,cat:'nonmetal'},
  {sym:'Cl',name:'氯',z:17,valences:[-1,1,5,7],en:3.16,cat:'halogen'},
  {sym:'Ar',name:'氩',z:18,valences:[0],en:0,cat:'noble'},
  {sym:'K',name:'钾',z:19,valences:[1],en:0.82,cat:'alkali'},
  {sym:'Ca',name:'钙',z:20,valences:[2],en:1.00,cat:'alkaline'},
  {sym:'Fe',name:'铁',z:26,valences:[2,3],en:1.83,cat:'transition'},
  {sym:'Cu',name:'铜',z:29,valences:[1,2],en:1.90,cat:'transition'},
  {sym:'Zn',name:'锌',z:30,valences:[2],en:1.65,cat:'transition'},
  {sym:'Ag',name:'银',z:47,valences:[1],en:1.93,cat:'transition'},
  {sym:'Br',name:'溴',z:35,valences:[-1,1,5],en:2.96,cat:'halogen'},
  {sym:'I',name:'碘',z:53,valences:[-1,1,5,7],en:2.66,cat:'halogen'},
  {sym:'Ba',name:'钡',z:56,valences:[2],en:0.89,cat:'alkaline'},
  {sym:'Au',name:'金',z:79,valences:[1,3],en:2.54,cat:'transition'},
  {sym:'Hg',name:'汞',z:80,valences:[1,2],en:2.00,cat:'transition'},
  {sym:'Pb',name:'铅',z:82,valences:[2,4],en:2.33,cat:'metal'},
];

// 已知化合物库（优先匹配）
const KNOWN_COMPOUNDS = {
  'H,O':{name:'水 H₂O',a:2,b:1,bond:'共价键（极性）',note:'氢+2×氧-2 → H₂O。生命之源。'},
  'Cl,Na':{name:'氯化钠 NaCl',a:1,b:1,bond:'离子键',note:'Na⁺ + Cl⁻ → NaCl。食盐。'},
  'C,O':{name:'二氧化碳 CO₂',a:1,b:2,bond:'共价键（极性）',note:'C⁴⁺ + 2×O²⁻ → CO₂。你呼出来的。'},
  'H,N':{name:'氨 NH₃',a:1,b:3,bond:'共价键（极性）',note:'N³⁻ + 3×H⁺ → NH₃。刺鼻的碱。'},
  'Cl,H':{name:'氯化氢 HCl',a:1,b:1,bond:'共价键（极性）',note:'H⁺ + Cl⁻ → HCl。溶于水=盐酸。'},
  'Ca,O':{name:'氧化钙 CaO',a:1,b:1,bond:'离子键',note:'Ca²⁺ + O²⁻ → CaO。生石灰。'},
  'Mg,O':{name:'氧化镁 MgO',a:1,b:1,bond:'离子键',note:'Mg²⁺ + O²⁻ → MgO。耐火材料。'},
  'Fe,O':{name:'氧化铁 Fe₂O₃',a:2,b:3,bond:'离子键',note:'2×Fe³⁺ + 3×O²⁻ → Fe₂O₃。铁锈。'},
  'Al,O':{name:'氧化铝 Al₂O₃',a:2,b:3,bond:'离子键',note:'2×Al³⁺ + 3×O²⁻ → Al₂O₃。刚玉/蓝宝石。'},
  'O,S':{name:'二氧化硫 SO₂',a:1,b:2,bond:'共价键（极性）',note:'S⁴⁺ + 2×O²⁻ → SO₂。火山气体。'},
  'Cl,K':{name:'氯化钾 KCl',a:1,b:1,bond:'离子键',note:'K⁺ + Cl⁻ → KCl。低钠盐。'},
  'Ca,Cl':{name:'氯化钙 CaCl₂',a:1,b:2,bond:'离子键',note:'Ca²⁺ + 2×Cl⁻ → CaCl₂。干燥剂。'},
  'Na,O':{name:'氧化钠 Na₂O',a:2,b:1,bond:'离子键',note:'2×Na⁺ + O²⁻ → Na₂O。碱性氧化物。'},
  'Cu,O':{name:'氧化铜 CuO',a:1,b:1,bond:'离子键',note:'Cu²⁺ + O²⁻ → CuO。黑色粉末。'},
  'O,Zn':{name:'氧化锌 ZnO',a:1,b:1,bond:'离子键',note:'Zn²⁺ + O²⁻ → ZnO。防晒霜成分。'},
  'Ag,Cl':{name:'氯化银 AgCl',a:1,b:1,bond:'离子键',note:'Ag⁺ + Cl⁻ → AgCl。感光材料。'},
  'C,H':{name:'甲烷 CH₄',a:1,b:4,bond:'共价键（非极性）',note:'C⁴⁻ + 4×H⁺ → CH₄。天然气。'},
  'N,O':{name:'一氧化氮 NO',a:1,b:1,bond:'共价键（极性）',note:'N²⁺ + O²⁻ → NO。信号分子。'},
  'Br,Na':{name:'溴化钠 NaBr',a:1,b:1,bond:'离子键',note:'Na⁺ + Br⁻ → NaBr。镇静剂原料。'},
  'O,P':{name:'五氧化二磷 P₂O₅',a:2,b:5,bond:'共价键（极性）',note:'2×P⁵⁺ + 5×O²⁻ → P₂O₅。强力干燥剂。'},
};

let slots = [null, null];

// ============ 渲染元素面板 ============
function buildElements(){
  const container = document.getElementById('elements');
  ELEMENTS.forEach(el => {
    const div = document.createElement('div');
    div.className = 'elem '+el.cat;
    div.draggable = true;
    div.dataset.sym = el.sym;
    div.innerHTML = `
      <span class="num">${el.z}</span>
      <span class="sym">${el.sym}</span>
      <span class="name">${el.name}</span>
    `;
    div.addEventListener('dragstart', onDragStart);
    div.addEventListener('dragend', onDragEnd);
    container.appendChild(div);
  });
}

// ============ 拖拽事件 ============
function onDragStart(e){
  e.dataTransfer.setData('text/plain', e.target.closest('.elem').dataset.sym);
  e.target.closest('.elem').classList.add('dragging');
}
function onDragEnd(e){
  e.target.closest('.elem').classList.remove('dragging');
}

document.querySelectorAll('.slot').forEach(slot => {
  slot.addEventListener('dragover', e => {e.preventDefault();slot.classList.add('drag-over')});
  slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
  slot.addEventListener('drop', e => {
    e.preventDefault();
    slot.classList.remove('drag-over');
    const sym = e.dataTransfer.getData('text/plain');
    const idx = parseInt(slot.dataset.index);
    const el = ELEMENTS.find(x=>x.sym===sym);
    if(el) fillSlot(idx, el);
  });
});

// 点击选择（移动端友好）
document.addEventListener('DOMContentLoaded', ()=>{
  let selectedSym = null;
  document.getElementById('elements').addEventListener('click', e=>{
    const elemDiv = e.target.closest('.elem');
    if(!elemDiv) return;
    const sym = elemDiv.dataset.sym;
    if(selectedSym === sym){selectedSym=null;elemDiv.style.outline='none';return}
    // 取消上一选中
    if(selectedSym){const prev=document.querySelector(`.elem[data-sym="${selectedSym}"]`);if(prev)prev.style.outline='none'}
    selectedSym = sym;
    elemDiv.style.outline = '3px solid #b8860b';
    elemDiv.style.borderRadius = '10px';
    // 找到空槽填入
    const emptySlot = slots[0]===null ? 0 : (slots[1]===null ? 1 : -1);
    if(emptySlot>=0){
      const el = ELEMENTS.find(x=>x.sym===sym);
      fillSlot(emptySlot, el);
      selectedSym=null;elemDiv.style.outline='none';
    } else {
      document.getElementById('hint').textContent='两个槽都满了！先点 × 清掉一个';
    }
  });
});

function fillSlot(idx, el){
  slots[idx] = el;
  const slot = document.getElementById('slot'+(idx+1));
  slot.classList.add('filled');
  slot.querySelector('.ssym').textContent = el.sym;
  slot.querySelector('.sname').textContent = el.name;
  updateCombineBtn();
  document.getElementById('hint').textContent = slots[1]===null ? '👇 再选第二个元素' : '两个元素就绪！点"组合"';
}

function clearSlot(idx){
  slots[idx] = null;
  const slot = document.getElementById('slot'+(idx+1));
  slot.classList.remove('filled');
  updateCombineBtn();
  document.getElementById('result').classList.remove('show');
  document.getElementById('hint').textContent = slots[0]===null ? '👇 选一个元素填入' : '👇 再选第二个元素';
}

function updateCombineBtn(){
  document.getElementById('combine-btn').disabled = !(slots[0] && slots[1]);
}

// ============ 化合价匹配算法 ============
function findValencePair(e1, e2){
  // 尝试所有化合价组合，找能配平的
  for(const v1 of e1.valences){
    if(v1===0) continue;
    for(const v2 of e2.valences){
      if(v2===0) continue;
      const abs1 = Math.abs(v1), abs2 = Math.abs(v2);
      const lcm = lcm_fn(abs1, abs2);
      const a = lcm / abs1, b = lcm / abs2;
      // 正负搭配
      if((v1>0 && v2<0) || (v1<0 && v2>0)){
        return {a, b, v1, v2, ok:true, lcm};
      }
    }
  }
  // 都正或都负时，尝试最常见的组合
  // 两个金属→合金/金属间化合物
  if(e1.valences.every(v=>v>0) && e2.valences.every(v=>v>0)){
    return {a:1,b:1,v1:e1.valences[0],v2:e2.valences[0],ok:false,reason:'两个金属——合金或金属间化合物，不是常规化合'};
  }
  const abs1=Math.abs(e1.valences.find(v=>v!==0)||1);
  const abs2=Math.abs(e2.valences.find(v=>v!==0)||1);
  const l=lcm_fn(abs1,abs2);
  return {a:l/abs1,b:l/abs2,v1:e1.valences.find(v=>v!==0)||0,v2:e2.valences.find(v=>v!==0)||0,ok:false};
}
function lcm_fn(a,b){let m=a*b;while(b){[a,b]=[b,a%b]}return m/a}

// ============ 组合 ============
function combine(){
  const e1=slots[0], e2=slots[1];
  if(!e1||!e2) return;
  // 惰性气体
  if(e1.valences[0]===0 && e2.valences[0]===0){
    showResult(`${e1.name}气 + ${e2.name}气`,`不反应——两者都是惰性气体。`,'外层电子已满，不需要得失电子。','');
    drawTwoAtoms(e1,e2,'noble');
    return;
  }
  if(e1.valences[0]===0){
    showResult(`${e2.name} + ${e1.name}气`,`不反应——${e1.name}是惰性气体。`,'外层电子已满，拒绝得失电子。','');
    drawSingleAtom(e2);
    return;
  }
  if(e2.valences[0]===0){
    showResult(`${e1.name} + ${e2.name}气`,`不反应——${e2.name}是惰性气体。`,'外层电子已满，拒绝得失电子。','');
    drawSingleAtom(e1);
    return;
  }

  // 查已知化合物库
  const pairKey = [e1.sym,e2.sym].sort().join(',');
  if(KNOWN_COMPOUNDS[pairKey]){
    const k=KNOWN_COMPOUNDS[pairKey];
    showResult(k.name, k.bond, k.note, pairKey);
    drawBond(k.a, k.b, e1, e2, k.bond.includes('离子'));
    return;
  }

  // 计算化合价匹配
  const vp = findValencePair(e1, e2);
  if(!vp.ok && vp.reason){
    const enDiff = Math.abs(e1.en - e2.en);
    showResult(`${e1.name} + ${e2.name}`,`${vp.reason}`,
      `电负性差: ${enDiff.toFixed(2)}。不能形成常规化合物。`,'');
    drawTwoAtoms(e1,e2,'metal');
    return;
  }

  // 判断键类型
  const enDiff = Math.abs(e1.en - e2.en);
  let bondType = enDiff > 1.7 ? '离子键' : '共价键';
  let bondDetail = enDiff > 1.7
    ? `电负性差 ${enDiff.toFixed(2)} > 1.7 → 电子转移 → 离子键`
    : `电负性差 ${enDiff.toFixed(2)} < 1.7 → 电子共用 → 共价键${enDiff>0.5?'（极性）':'（非极性）'}`;
  if(e1.cat==='metal'&&e2.cat==='metal'){bondType='金属键';bondDetail='电子海 → 金属键'}

  // 生成化学式
  const aSub = vp.a>1 ? sub(vp.a) : '';
  const bSub = vp.b>1 ? sub(vp.b) : '';
  const aPart = vp.a>1 ? `${vp.a}×` : '';
  const bPart = vp.b>1 ? `${vp.b}×` : '';
  // Chinese naming: lower EN element first (like "氧化铁" not "铁化氧")
  const enFirst = e1.en <= e2.en ? e1 : e2;
  const enSecond = e1.en <= e2.en ? e2 : e1;
  const aSub2 = enFirst===e1 ? aSub : bSub;
  const bSub2 = enFirst===e1 ? bSub : aSub;
  const name = `${enFirst.name}化${enSecond.name} ${enFirst.sym}${aSub2}${enSecond.sym}${bSub2}`;
  const sign1 = vp.v1>0?'⁺':'⁻', sign2 = vp.v2>0?'⁺':'⁻';
  const note = `${aPart}${e1.sym}${sign1}${sup(Math.abs(vp.v1))} + ${bPart}${e2.sym}${sign2}${sup(Math.abs(vp.v2))} → ${e1.sym}${aSub}${e2.sym}${bSub}。${bondDetail}。`;

  showResult(name, bondType, note, pairKey);
  drawBond(vp.a, vp.b, e1, e2, bondType==='离子键');
}

function sub(n){const m='₀₁₂₃₄₅₆₇₈₉';return String(n).split('').map(c=>m[c]).join('')}
function sup(n){const m='⁰¹²³⁴⁵⁶⁷⁸⁹';return String(n).split('').map(c=>m[c]).join('')}

function showResult(name, bond, note, pairKey){
  document.getElementById('compound-name').textContent = name;
  document.getElementById('bond-type').textContent = bond;
  document.getElementById('formula-note').textContent = note;
  document.getElementById('result').classList.add('show');
}

// ============ Canvas 分子结构图 ============
function drawBond(aCount, bCount, e1, e2, isIonic){
  const c=document.getElementById('mol-canvas');
  const ctx=c.getContext('2d');
  const W=c.width, H=c.height;
  ctx.clearRect(0,0,W,H);

  // 背景
  ctx.fillStyle='#faf8f2';
  ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  const r1=28, r2=r1;
  // 根据原子个数布局
  if(aCount===1 && bCount===1){
    // A-B 双原子
    drawAtom(ctx, cx-80, cy, r1, e1);
    drawAtom(ctx, cx+80, cy, r2, e2);
    if(isIonic){
      // 离子键：虚线+电子箭头
      ctx.setLineDash([6,4]);
      ctx.strokeStyle='#c0392b';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx-80+r1,cy);ctx.lineTo(cx+80-r2,cy);ctx.stroke();
      ctx.setLineDash([]);
      // 电子从金属→非金属
      const dir = e1.en < e2.en ? 1 : -1;
      const fromX = dir>0 ? cx-80+r1+5 : cx+80-r2-5;
      const toX = dir>0 ? cx+80-r2-5 : cx-80+r1+5;
      ctx.fillStyle='#e67e22';
      ctx.beginPath();ctx.arc(toX,cy-20,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='7px sans-serif';
      ctx.fillText('e⁻',toX-5,cy-17);
      ctx.fillStyle='#999';ctx.font='10px sans-serif';
    } else {
      // 共价键：实线
      ctx.strokeStyle='#2c3e50';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(cx-80+r1,cy-3);ctx.lineTo(cx+80-r2,cy-3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-80+r1,cy+3);ctx.lineTo(cx+80-r2,cy+3);ctx.stroke();
      // 共享电子对
      ctx.fillStyle='#27ae60';
      ctx.beginPath();ctx.arc(cx,cy-8,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='7px sans-serif';
      ctx.fillText('⁚',cx-4,cy-5);
    }
    // 标注
    ctx.fillStyle='#555';ctx.font='11px sans-serif';
    ctx.fillText(e1.sym, cx-80, cy+r1+18);
    ctx.fillText(e2.sym, cx+80, cy+r2+18);
  } else if(aCount===1 && bCount===2){
    // AB₂ 三角
    drawAtom(ctx, cx, cy-10, r1, e1);
    drawAtom(ctx, cx-90, cy+40, r2-4, e2);
    drawAtom(ctx, cx+90, cy+40, r2-4, e2);
    ctx.strokeStyle='#2c3e50';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,cy-10+r1);ctx.lineTo(cx-90,cy+40-r2+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-10+r1);ctx.lineTo(cx+90,cy+40-r2+4);ctx.stroke();
    ctx.fillStyle='#555';ctx.font='10px sans-serif';
    ctx.fillText(e1.sym,cx,cy-10-r1-6);
    ctx.fillText(e2.sym,cx-90,cy+40+r2+2);
    ctx.fillText(e2.sym,cx+90,cy+40+r2+2);
  } else if(aCount===2 && bCount===1){
    drawBond(bCount, aCount, e2, e1, isIonic);
    return;
  } else if(aCount===1 && bCount===3){
    // NH₃ 三角锥
    drawAtom(ctx, cx, cy-20, r1, e1);
    const ang=2*Math.PI/3;
    for(let i=0;i<3;i++){
      const x=cx+95*Math.cos(ang*i-Math.PI/2),y=cy+50+95*Math.sin(ang*i-Math.PI/2);
      drawAtom(ctx, x, y, r2-6, e2);
      ctx.strokeStyle='#2c3e50';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx,cy-20+r1);ctx.lineTo(x,y-r2+6);ctx.stroke();
      ctx.fillStyle='#555';ctx.font='9px sans-serif';
      ctx.fillText(e2.sym,x,y+r2);
    }
    ctx.fillStyle='#555';ctx.font='11px sans-serif';
    ctx.fillText(e1.sym,cx,cy-20-r1-6);
  } else if(aCount===2 && bCount===3){
    // Fe₂O₃ 型
    drawAtom(ctx, cx-100, cy-20, r1, e1);
    drawAtom(ctx, cx-100, cy+40, r1, e1);
    drawAtom(ctx, cx+100, cy-20, r2, e2);
    drawAtom(ctx, cx+100, cy+10, r2, e2);
    drawAtom(ctx, cx+100, cy+40, r2, e2);
    ctx.strokeStyle='#c0392b';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(cx-100+r1,cy-20);ctx.lineTo(cx+100-r2,cy-20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-100+r1,cy-20);ctx.lineTo(cx+100-r2,cy+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-100+r1,cy+40);ctx.lineTo(cx+100-r2,cy+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-100+r1,cy+40);ctx.lineTo(cx+100-r2,cy+40);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#555';ctx.font='10px sans-serif';
    ctx.fillText(e1.sym,cx-100,cy-20-r1-6);
    ctx.fillText(e1.sym,cx-100,cy+40+r1+12);
    ctx.fillText(e2.sym,cx+100,cy-20-r1-6);
    ctx.fillText(e2.sym,cx+100,cy+10);ctx.fillText(e2.sym,cx+100,cy+40+r1+12);
  } else if(aCount===1 && bCount===4){
    // CH₄ 正四面体
    drawAtom(ctx, cx, cy-10, r1, e1);
    const angs=[-Math.PI/2,Math.PI/6,5*Math.PI/6,0];
    for(let i=0;i<4;i++){
      const x=cx+95*Math.cos(angs[i]),y=cy+40+95*Math.sin(angs[i])*(i<3?1:-1);
      drawAtom(ctx, x, y, r2-8, e2);
      ctx.strokeStyle='#2c3e50';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx,cy-10+r1);ctx.lineTo(x,y-r2+8);ctx.stroke();
      ctx.fillStyle='#555';ctx.font='8px sans-serif';
      ctx.fillText(e2.sym,x,y+r2);
    }
    ctx.fillStyle='#555';ctx.font='11px sans-serif';
    ctx.fillText(e1.sym,cx,cy-10-r1-6);
  } else if(aCount===2 && bCount===5){
    // P₂O₅ 型——简化展示
    drawAtom(ctx, cx, cy-30, r1, e1);
    drawAtom(ctx, cx, cy+30, r1, e1);
    const angs=[0,Math.PI/3,2*Math.PI/3,Math.PI,4*Math.PI/3,5*Math.PI/3];
    const placed=[];
    for(let i=0;i<5;i++){
      const x=cx+130*Math.cos(angs[i]),y=cy+130*Math.sin(angs[i]);
      drawAtom(ctx, x, y, r2-8, e2);
      ctx.strokeStyle='#2c3e50';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx,cy-30+r1);ctx.lineTo(x,y-r2+8);ctx.stroke();
      ctx.fillStyle='#555';ctx.font='8px sans-serif';ctx.fillText(e2.sym,x,y+r2);
    }
    ctx.fillStyle='#555';ctx.font='11px sans-serif';
    ctx.fillText(e1.sym,cx,cy-30-r1-8);
    ctx.fillText(e1.sym,cx,cy+30+r1+12);
  } else {
    // 通用
    drawAtom(ctx, cx-100, cy, r1, e1);
    drawAtom(ctx, cx+100, cy, r2, e2);
    ctx.strokeStyle='#2c3e50';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-100+r1,cy);ctx.lineTo(cx+100-r2,cy);ctx.stroke();
    ctx.fillStyle='#555';ctx.font='11px sans-serif';
    ctx.fillText(e1.sym,cx-100,cy+r1+16);
    ctx.fillText(e2.sym,cx+100,cy+r2+16);
  }
}

function drawAtom(ctx, x, y, r, el){
  // 元素球
  const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
  const colors = {
    metal:['#e8d5a3','#c4a050'],nonmetal:['#b8d4a8','#60884a'],
    alkali:['#f5d880','#d4952a'],alkaline:['#e8d098','#b89030'],
    halogen:['#f0c8b0','#c47040'],noble:['#d8c8e0','#9068a8'],
    transition:['#d8c0a0','#a87030'],
  };
  const [light, dark] = colors[el.cat] || colors.metal;
  grad.addColorStop(0, light);
  grad.addColorStop(1, dark);
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  // 符号
  ctx.fillStyle='#fff';ctx.font=`bold ${r*0.7}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(el.sym, x, y);
  ctx.textAlign='start';
}

function drawTwoAtoms(e1, e2, mode){
  const c=document.getElementById('mol-canvas');
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#faf8f2';ctx.fillRect(0,0,W,H);
  drawAtom(ctx, W/2-80, H/2, 28, e1);
  drawAtom(ctx, W/2+80, H/2, 28, e2);
  if(mode==='noble'){
    ctx.fillStyle='#999';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText('✗',W/2,H/2+6);
    ctx.fillText('外层电子已满',W/2,H/2+30);
  } else if(mode==='metal'){
    ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('金属间化合物',W/2,H/2+20);
  }
  ctx.fillStyle='#555';ctx.font='11px sans-serif';
  ctx.fillText(e1.sym,W/2-80,H/2+46);
  ctx.fillText(e2.sym,W/2+80,H/2+46);
  ctx.textAlign='start';
}

function drawSingleAtom(el){
  const c=document.getElementById('mol-canvas');
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#faf8f2';ctx.fillRect(0,0,W,H);
  drawAtom(ctx, W/2, H/2, 36, el);
  ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('惰性气体·不反应',W/2,H/2+60);
  ctx.textAlign='start';
}

// ============ 启动 ============
buildElements();
</script>
