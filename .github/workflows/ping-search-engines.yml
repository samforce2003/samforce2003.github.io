name: Ping Search Engines

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: IndexNow — Bing + Yandex
        run: |
          URLS='[
            "https://samforce2003.github.io/",
            "https://samforce2003.github.io/llms.txt",
            "https://samforce2003.github.io/sitemap.xml",
            "https://samforce2003.github.io/%E7%BB%93%E6%9E%84%E5%8A%A0%E6%B3%95-%E4%B8%BA%E4%BB%80%E4%B9%881+1%3D3.md",
            "https://samforce2003.github.io/%E5%AE%A2%E8%A7%82%E4%B8%8D%E5%86%B3%E5%AE%9A%E6%84%8F%E8%AF%86-%E5%8F%8C%E5%90%91%E4%BA%92%E4%BF%83%E8%AE%BA-%E6%9E%97%E5%B0%8F%E9%BB%91-v3.md",
            "https://samforce2003.github.io/%E8%96%9B%E5%AE%9A%E8%B0%94%E7%8C%AB%E7%9A%84%E6%B6%88%E8%A7%A3-%E7%BB%93%E6%9E%84%E5%8A%A0%E6%B3%95%E5%AF%B9%E9%87%8F%E5%AD%90%E6%B5%8B%E9%87%8F%E9%97%AE%E9%A2%98%E7%9A%84%E5%AE%9E%E9%AA%8C%E8%A3%81%E5%86%B3.md",
            "https://samforce2003.github.io/%E4%B8%BA%E4%BB%80%E4%B9%88%E7%BB%93%E6%9E%84%E5%AD%A6%E6%9B%B4%E4%BC%98-%E4%B8%8D%E6%98%AF%E5%88%9B%E6%96%B0%E6%98%AF%E9%87%8D%E7%BB%84.md",
            "https://samforce2003.github.io/%E5%91%BC%E5%90%B8-%E4%B8%BA%E4%BB%80%E4%B9%88%E7%89%A9%E8%B4%A8%E4%B8%8E%E6%84%8F%E8%AF%86%E4%BA%A4%E6%9B%BF%E4%B8%BB%E5%AF%BC.md"
          ]'
          
          echo "{\"host\":\"samforce2003.github.io\",\"key\":\"samforce2003\",\"urlList\":$URLS}" > payload.json
          curl -s -w "\nIndexNow: %{http_code}" -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" -d @payload.json

      - name: Google sitemap ping
        run: |
          curl -s -w "\nGoogle: %{http_code}" "https://www.google.com/ping?sitemap=https://samforce2003.github.io/sitemap.xml"

      - name: Summary
        run: echo "✅ Search engines pinged for $(date)"
